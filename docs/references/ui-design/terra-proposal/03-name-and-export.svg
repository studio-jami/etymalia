<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="860" viewBox="0 0 1440 860" role="img" aria-labelledby="title desc">
  <title id="title">Name selection and export validation wireframe</title><desc id="desc">Two wireframes: the Etymaria name workspace with a shortlist and domain status, and the export release checklist.</desc>
  <style>.bg{fill:#101114}.panel{fill:#181a20;stroke:#535866;stroke-width:1.4}.soft{fill:#20232b;stroke:#535866;stroke-width:1.2}.accent{fill:#be4cff}.outline{fill:none;stroke:#be4cff;stroke-width:2}.text{fill:#f4f2f7;font-family:Arial,sans-serif}.muted{fill:#aaa7b2;font-family:Arial,sans-serif}.heading{font-size:20px;font-weight:bold}.body{font-size:14px}.small{font-size:12px}.label{font-size:10px;font-weight:bold;letter-spacing:1px}</style>
  <rect class="bg" width="1440" height="860"/>
  <text class="text heading" x="46" y="42">C. Name decision and export — the selected source of truth drives a validated kit</text>
  <rect class="panel" x="40" y="72" width="778" height="714" rx="14"/>
  <text class="muted label" x="72" y="108">NAME / DISCOVER</text><text class="text heading" x="72" y="139">Names with provenance, not a pile of words</text>

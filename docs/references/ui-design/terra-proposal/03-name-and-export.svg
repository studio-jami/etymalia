  <rect class="soft" x="72" y="268" width="220" height="198" rx="10"/><rect class="outline" x="72" y="268" width="220" height="198" rx="10"/>
  <text class="text heading" x="93" y="307">Lumenry</text><text class="muted small" x="93" y="332">LOO-men-ree · 3 syllables</text><text class="text small" x="93" y="365">Latin lumen “light” + -ry</text><text class="muted small" x="93" y="388">Meaning: clarity made useful</text><circle cx="101" cy="425" r="6" fill="#f0c56c"/><text class="text small" x="116" y="429">.com checking</text><text class="accent small" x="93" y="453">✓ Shortlisted</text>
  <rect class="soft" x="310" y="268" width="220" height="198" rx="10"/><text class="text heading" x="331" y="307">Verita</text><text class="muted small" x="331" y="332">veh-REE-ta · 3 syllables</text><text class="text small" x="331" y="365">Latin veritas “truth”</text><text class="muted small" x="331" y="388">Meaning: clear conviction</text><circle cx="339" cy="425" r="6" fill="#75d99a"/><text class="text small" x="354" y="429">.studio available</text><text class="muted small" x="331" y="453">Add to shortlist</text>
  <rect class="soft" x="548" y="268" width="220" height="198" rx="10"/><text class="text heading" x="569" y="307">Ordana</text><text class="muted small" x="569" y="332">or-DAH-na · 3 syllables</text><text class="text small" x="569" y="365">Latin ordo “order” + ana</text><text class="muted small" x="569" y="388">Meaning: harmonious order</text><circle cx="577" cy="425" r="6" fill="#75d99a"/><text class="text small" x="592" y="429">.co available</text><text class="muted small" x="569" y="453">Add to shortlist</text>
  <rect class="soft" x="72" y="486" width="696" height="123" rx="10"/><text class="muted label" x="94" y="516">SHORTLIST · 2 OF 6</text><text class="text body" x="94" y="551">Lumenry</text><text class="muted small" x="198" y="551">meaning fit 94 · pronunciation 88 · availability pending</text><line x1="94" y1="570" x2="742" y2="570" stroke="#535866"/><text class="text body" x="94" y="597">Verita</text><text class="muted small" x="198" y="597">meaning fit 89 · pronunciation 96 · .studio available</text>
  <rect class="soft" x="72" y="638" width="305" height="104" rx="9"/><text class="text body" x="94" y="670">Compare domain options</text><text class="muted small" x="94" y="695">RDAP results, timestamp, source</text><text class="accent small" x="94" y="725">Open comparison →</text>

  <rect class="accent" x="531" y="164" width="112" height="42" rx="7"/><text class="text body" x="554" y="190">Generate</text>
  <rect class="soft" x="662" y="164" width="122" height="42" rx="7"/><text class="text small" x="686" y="190">Grid  ▾</text>
